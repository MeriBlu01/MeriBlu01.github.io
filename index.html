<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Swiper CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
  <!-- Custom Styles -->
  <link rel="stylesheet" href="styles.css">
  <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
   <!-- Custom Script -->
  <script defer src="script.js"></script>
</head>
<body>
  <div class="container" data-aos="zoom-in">

    <!-- Encabezado con foto -->
    <header class="header">
      <img src="assets/bride-8182890_1920.jpg" alt="Foto principal" class="main-photo">
      <h1>¡Estás invitado!</h1>
    </header>

    <!-- Imagen de portada -->
    <div class="cover">
      <img src="assets/bride-8182890_1920.jpg" alt="Portada">
      <div class="cover-text">
        <h1>¡Bienvenidos a Nuestra Celebración!</h1>
      </div>
    </div>

    <!-- Contador regresivo -->
    <section class="countdown">
      <h2>Faltan:</h2>
      <div id="timer">
        <span id="days"></span>d :
        <span id="hours"></span>h :
        <span id="minutes"></span>m :
        <span id="seconds"></span>s
      </div>
    </section>

    <!-- Galeria -->
    <section>
      <h2>Galería</h2>
      <!-- Slider main container -->
      <div class="swiper" effect="cards" grab-cursor="true">
        <!-- Additional required wrapper -->
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <img src="assets/wedding-01.jpg" alt="Foto 1">
          </div>
          <div class="swiper-slide">
            <img src="assets/wedding-02.png" alt="Foto 2">
          </div>
          <div class="swiper-slide">
            <img src="assets/wedding-03.jpg" alt="Foto 3">
          </div>
          <div class="swiper-slide">
            <img src="assets/wedding-04.jpg" alt="Foto 4">
          </div>
        </div>
      </div>
    </section>

    <!-- Links -->
    <section class="links">
      <h2>Información Importante</h2>
      <a href="https://forms.google.com" target="_blank" class="link">Confirma tu asistencia</a>
      <a href="https://mesasderegalos.com" target="_blank" class="link">Mesas de regalo</a>
    </section>

    <!-- Ubicación -->
    <section class="map">
      <h2>Ubicación</h2>
      <iframe 
        src="https://www.google.com/maps/place/Hacienda+de+Chiapa/@19.3362867,-103.6574948,17.25z/data=!4m6!3m5!1s0x84255c0a6dca4b4d:0xc6ef45e22dbbcd50!8m2!3d19.3363276!4d-103.655333!16s%2Fg%2F1pxqbqkv6?entry=ttu&g_ep=EgoyMDI1MDExNS4wIKXMDSoASAFQAw%3D%3D" 
        width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
    </section>

    <!-- Interactividad -->
    <section class="interactive">
      <h2>Detalles</h2>
      <textarea placeholder="Escribe un mensaje para nosotros"></textarea>
      <select>
        <option value="" disabled selected>Selecciona tu menú</option>
        <option value="veg">Vegetariano</option>
        <option value="non-veg">No Vegetariano</option>
        <option value="kids">Menú Infantil</option>
      </select>
    </section>

    <!-- Formulario de asistencia -->
    <h1>Confirmación de Asistencia</h1>
    <section>
      <form id="confirmationForm">
        <label for="name">Nombre:</label>
        <input type="text" id="name" name="name" placeholder="Tu nombre" required />

        <label for="attendance">¿Asistirás?</label>
        <select id="attendance" name="attendance" required>
            <option value="Sí">Sí</option>
            <option value="No">No</option>
        </select>

        <label for="comment">Comentarios:</label>
        <textarea id="comment" name="comment" placeholder="Déjanos tus comentarios..."></textarea>

        <button type="submit">Enviar</button>
      </form>
    </section>
    

    <!-- Audio -->
    <section class="audio">
      <h2>Escucha nuestra canción</h2>
      <audio id="background-audio" autoplay loop controls>
        <source src="my-love-medium-177577.mp3" type="audio/mpeg">
        Tu navegador no soporta el elemento de audio.
      </audio>
    </section>

    <!-- Footer -->
    <footer>
      <p>¡Te esperamos con ansias!</p>
      <div class="social-icons">
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
      </div>
    </footer>
  </div>
</body>
</html>
