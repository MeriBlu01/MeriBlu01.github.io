<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="script.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div class="container">
    <!-- Encabezado con foto -->
    <header class="header">
      <img src="foto-profesional.jpg" alt="Foto principal" class="main-photo">
      <h1>¡Estás invitado!</h1>
    </header>

    <!-- Contador regresivo -->
    <section class="countdown">
      <h2>Faltan:</h2>
      <div id="timer">
        <span id="days"></span>d :
        <span id="hours"></span>h :
        <span id="minutes"></span>m :
        <span id="seconds"></span>s
      </div>
    </section>

    <!-- Links -->
    <section class="links">
      <h2>Información Importante</h2>
      <a href="https://forms.google.com" target="_blank" class="link">Confirma tu asistencia</a>
      <a href="https://mesasderegalos.com" target="_blank" class="link">Mesas de regalo</a>
    </section>

    <!-- Ubicación -->
    <section class="map">
      <h2>Ubicación</h2>
      <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.8354345095674!2d144.95373531531542!3d-37.81627917975153!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6ad642af0f11fd81%3A0xf5771df2176b8b1b!2sFederation%20Square!5e0!3m2!1sen!2sau!4v1636721344849!5m2!1sen!2sau" 
        width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
    </section>

    <!-- Interactividad -->
    <section class="interactive">
      <h2>Detalles</h2>
      <textarea placeholder="Escribe un mensaje para nosotros"></textarea>
      <select>
        <option value="" disabled selected>Selecciona tu menú</option>
        <option value="veg">Vegetariano</option>
        <option value="non-veg">No Vegetariano</option>
        <option value="kids">Menú Infantil</option>
      </select>
    </section>

    <!-- Audio -->
    <section class="audio">
      <h2>Escucha nuestra canción</h2>
      <audio id="background-audio" autoplay loop controls>
        <source src="cancion.mp3" type="audio/mpeg">
        Tu navegador no soporta el elemento de audio.
      </audio>
    </section>

    <!-- Footer -->
    <footer>
      <p>¡Te esperamos con ansias!</p>
      <div class="social-icons">
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
      </div>
    </footer>
  </div>
</body>
</html>
